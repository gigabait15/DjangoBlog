{% extends 'Blogs/base.html' %}

{% block content %}

<div class="flex items-center justify-center min-h-screen bg-gray-100 dark:bg-gray-900">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Профиль</h2>
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div class="flex items-center justify-center">
                {% if user.avatar %}
                    <img src="{{ user.avatar.url }}" alt="Avatar" class="w-24 h-24 rounded-full mb-4 object-cover">
                {% else %}
                    <div class="w-24 h-24 rounded-full bg-gray-300 mb-4 flex items-center justify-center text-gray-600">
                        <span>Нет аватара</span>
                    </div>
                {% endif %}
            </div>
            {{ form.as_p }}
            <button type="submit" class="w-full py-2 px-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700
            focus:ring-4 focus:ring-blue-300 dark:bg-blue-500 dark:hover:bg-blue-600
            dark:focus:ring-blue-800">Сохранить изменения</button>
            <a href="{% url 'user:profile' %}" class="w-full py-2 px-4 text-center text-blue-600 bg-gray-200
             rounded-lg hover:bg-gray-300 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:bg-gray-700
             dark:text-blue-400 dark:hover:bg-gray-600 dark:focus:ring-gray-800">Отмена</a>
        </form>
    </div>
</div>

{% endblock content %}
