{% extends 'Blogs/base.html' %}

{% block content %}

<div class="flex items-center justify-center min-h-screen bg-gray-100 dark:bg-gray-900">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Регистрация</h2>
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div class="relative z-0 w-full mb-5 group">
                <input type="email" name="email" id="id_email" class="block py-2.5 px-0 w-full text-sm
                    text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none dark:text-white
                     dark:border-gray-600 dark:focus:border-blue-500 focus:outline-none focus:ring-0
                     focus:border-blue-600 peer" placeholder=" " required/>
                <label for="id_email" class="peer-focus:font-medium absolute text-sm text-gray-500
                    dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0]
                    peer-focus:start-0 rtl:peer-focus:translate-x-1/4 peer-focus:text-blue-600
                    peer-focus:dark:text-blue-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0
                     peer-focus:scale-75 peer-focus:-translate-y-6">{{form.email.label}}</label>
            </div>

            <div class="relative z-0 w-full mb-5 group">
                <input type="text" name="username" id="id_username" class="block py-2.5 px-0 w-full text-sm
                 text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none dark:text-white
                 dark:border-gray-600 dark:focus:border-blue-500 focus:outline-none focus:ring-0 focus:border-blue-600
                  peer" placeholder=" " required/>
                <label for="id_username" class="peer-focus:font-medium absolute text-sm text-gray-500
                dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0]
                 peer-focus:start-0 rtl:peer-focus:translate-x-1/4 peer-focus:text-blue-600
                 peer-focus:dark:text-blue-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0
                  peer-focus:scale-75 peer-focus:-translate-y-6">{{form.username.label}}</label>
            </div>

            <div class="relative z-0 w-full mb-5 group">
                <input type="password" name="password" id="id_password" class="block py-2.5 px-0 w-full text-sm
                 text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none dark:text-white
                  dark:border-gray-600 dark:focus:border-blue-500 focus:outline-none focus:ring-0
                  focus:border-blue-600 peer" placeholder=" " required/>
                <label for="id_password" class="peer-focus:font-medium absolute text-sm text-gray-500
                dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0]
                 peer-focus:start-0 rtl:peer-focus:translate-x-1/4 peer-focus:text-blue-600
                 peer-focus:dark:text-blue-500 peer-placeholder-shown:scale-100
                  peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Пароль{{form.password.label}}
                </label>
            </div>

            <div class="relative z-0 w-full mb-5 group">
                <input type="password" name="confirm_password" id="floating_repeat_password" class="block py-2.5 px-0
                 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none
                 dark:text-white dark:border-gray-600 dark:focus:border-blue-500 focus:outline-none focus:ring-0
                 focus:border-blue-600 peer" placeholder=" " required/>
                <label for="floating_repeat_password" class="peer-focus:font-medium absolute text-sm text-gray-500
                dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0]
                peer-focus:start-0 rtl:peer-focus:translate-x-1/4 peer-focus:text-blue-600
                peer-focus:dark:text-blue-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0
                 peer-focus:scale-75 peer-focus:-translate-y-6">Confirm password</label>
            </div>

            <div class="relative z-0 w-full mb-5 group">
                <input type="text" name="first_name" id="id_first_name" class="block py-2.5 px-0 w-full
                text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none
                dark:text-white dark:border-gray-600 dark:focus:border-blue-500 focus:outline-none focus:ring-0
                 focus:border-blue-600 peer" placeholder=" " required/>
                <label for="id_first_name" class="peer-focus:font-medium absolute text-sm text-gray-500
                dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0]
                peer-focus:start-0 rtl:peer-focus:translate-x-1/4 peer-focus:text-blue-600
                peer-focus:dark:text-blue-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0
                peer-focus:scale-75 peer-focus:-translate-y-6">{{form.first_name.label}}</label>
            </div>

            <div class="relative z-0 w-full mb-5 group">
                <input type="text" name="last_name" id="id_last_name" class="block py-2.5 px-0 w-full text-sm
                text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none dark:text-white
                dark:border-gray-600 dark:focus:border-blue-500 focus:outline-none focus:ring-0 focus:border-blue-600
                peer" placeholder=" " required/>
                <label for="id_last_name" class="peer-focus:font-medium absolute text-sm text-gray-500
                 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0]
                 peer-focus:start-0 rtl:peer-focus:translate-x-1/4 peer-focus:text-blue-600
                 peer-focus:dark:text-blue-500 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0
                 peer-focus:scale-75 peer-focus:-translate-y-6">{{form.last_name.label}}</label>
            </div>

            <div class="relative z-0 w-full mb-5 group">
                <input type="file" name="avatar" id="id_avatar" class="block py-2.5 px-0 w-full text-sm text-gray-900
                bg-transparent border-0 border-b-2 border-gray-300 appearance-none dark:text-white dark:border-gray-600
                 dark:focus:border-blue-500 focus:outline-none focus:ring-0 focus:border-blue-600 peer"/>
                <label for="id_avatar" class="peer-focus:font-medium absolute text-sm text-gray-500 dark:text-gray-400
                duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0
                rtl:peer-focus:translate-x-1/4 peer-focus:text-blue-600 peer-focus:dark:text-blue-500
                 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75
                 peer-focus:-translate-y-6">{{form.avatar.label}}</label>
            </div>

            <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none
            focus:ring-blue-300 font-medium rounded-lg text-sm w-full sm:w-auto px-5 py-2.5 text-center
             dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Зарегистрироваться
            </button>
            <div class="text-center">
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    Уже зарегистрированы?
                    <a href="{% url 'user:login' %}"
                       class="font-medium text-blue-600 hover:text-blue-700 dark:text-blue-500
                       dark:hover:text-blue-400">Войти</a>
                </p>
            </div>
        </form>
    </div>
</div>

{% endblock content %}
