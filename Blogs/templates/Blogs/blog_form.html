{% extends 'Blogs/base.html' %}

{% block content %}

<div class="w-full max-w-4xl mx-auto mt-8">
    <form method="post" class="space-y-8">
        <div class="flex flex-wrap -mx-4">
            <div class="w-full lg:w-1/2 px-4 mb-8 lg:mb-0">
                <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                rounded-lg shadow-lg p-6">
                    <div>
                        {% csrf_token %}

                        <!-- Поле для Заголовка -->
                        <div class="mb-4">
                            <label for="id_title" class="block text-sm font-medium text-gray-700 dark:text-white">
                                {{ form.title.label }}
                            </label>
                            {{ form.title }}
                        </div>

                        <!-- Поле для Содержания -->
                        <div class="mb-4">
                            <label for="id_content" class="block text-sm font-medium text-gray-700 dark:text-white">
                                {{ form.content.label }}
                            </label>
                            {{ form.content }}
                        </div>

                        <!-- Поле для Изображения -->
                        <div class="mb-4">
                            <label for="id_image" class="block text-sm font-medium text-gray-700 dark:text-white">
                                {{ form.image.label }}
                            </label>
                            {{ form.image }}
                        </div>

                        <!-- Поле для Тегов -->
                        <div class="mb-4">
                            <label for="id_tags" class="block text-sm font-medium text-gray-700 dark:text-white">
                                {{ form.tags.label }}
                            </label>
                            {{ form.tags }}
                        </div>

                        <!-- Кнопка отправки -->
                        <button type="submit" class="w-full px-6 py-3 text-white bg-green-600 rounded-lg
                        hover:bg-green-700 dark:bg-green-500 dark:hover:bg-green-600 mt-4">
                            {% if object %}
                                Сохранить
                            {% else %}
                                Создать
                            {% endif %}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

{% endblock content %}
