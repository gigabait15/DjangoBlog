{% extends 'Blogs/base.html' %}

{% block content %}

<div class="flex justify-center">
    <div class="w-full lg:w-1/2 bg-green-200 dark:bg-gray-800 rounded-lg shadow-lg p-6">
        <h2 class="text-center text-xl">Хотите удалить</h2>
        <form method="post">
            {% csrf_token %}
            <p class="text-center text-xl">"{{ object.title }}"?</p>
            <div class="flex justify-center gap-4 mt-6">
                <button type="submit" class="inline-flex items-center px-5 py-2.5 text-sm font-medium text-center
                text-white bg-red-500 rounded-lg hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300
                dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-800">
                    Подтвердить
                </button>
                <a href="{% url 'blog:blog_list' %}" class="inline-flex items-center px-5 py-2.5 text-sm font-medium
                text-center text-white bg-green-500 rounded-lg hover:bg-green-800 focus:ring-4 focus:outline-none
                focus:ring-green-300 dark:bg-green-600 dark:hover:bg-green-700 dark:focus:ring-green-800">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock content %}
