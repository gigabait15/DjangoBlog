{% load compress %}
{% load static %}

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Типа Дзен</title>

    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
    {% compress css %}
    <link rel="stylesheet" href="{% static 'src/input.css' %}">
    {% endcompress %}
</head>

<body class="bg-green-50 flex flex-col min-h-screen"> <!-- flexbox для всего документа, min-h-screen для минимальной высоты -->

{% include 'Blogs/inc_menu/navbar.html' %}

<div class="container flex flex-col items-center space-y-4 mx-auto mt-6 flex-grow"> <!-- flex-grow для растягивания контента -->
    {% block content %}
    {% endblock content %}
</div>


<script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
</body>

<footer class="bg-white flex flex-col rounded-lg shadow m-4 dark:bg-gray-800 -scroll mt-auto"> <!-- mt-auto гарантирует, что footer всегда внизу -->
    <div class="w-full mx-auto max-w-screen-xl p-4 md:flex md:items-center md:justify-between">
      <span class="text-sm text-gray-500 sm:text-center dark:text-gray-400">© 2024 -  {% now "Y" %}
          <a href="https://flowbite.com/" class="hover:underline">Flowbite™</a>. All Rights Reserved.
    </span>
    <ul class="flex flex-wrap items-center mt-3 text-sm font-medium text-gray-500 dark:text-gray-400 sm:mt-0">

        <li>
            <a href="#" class="hover:underline">Contact</a>
        </li>
    </ul>
    </div>
</footer>

</html>
